<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Page not found. Return to Ultraphysiocare's physiotherapy services in Noida or contact us for help."/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>404 - Page Not Found | Ultraphysiocare</title>
  <link rel="shortcut icon" type="image/x-icon" href="images/favicon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet"/>
  <link href="css/bootstrap.min.css" rel="stylesheet" media="screen"/>
  <link href="css/slicknav.min.css" rel="stylesheet"/>
  <link href="css/all.css" rel="stylesheet" media="screen"/>
  <link href="css/animate.css" rel="stylesheet"/>
  <link href="css/custom.css" rel="stylesheet" media="screen"/>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"/>
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary-color) 0%, var(--accent-color) 100%);
      padding: 20px;
    }
    .error-content {
      text-align: center;
      background: white;
      padding: 60px 40px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      max-width: 600px;
      width: 100%;
    }
    .error-code {
      font-size: 120px;
      font-weight: 900;
      color: var(--accent-color);
      margin: 0;
      line-height: 1;
    }
    .error-title {
      font-size: 32px;
      color: var(--primary-color);
      margin: 20px 0;
      font-weight: 700;
    }
    .error-description {
      font-size: 16px;
      color: #666;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .error-buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 30px;
    }
    .btn-error {
      padding: 12px 30px;
      border-radius: 5px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      display: inline-block;
    }
    .btn-home {
      background: var(--accent-color);
      color: white;
    }
    .btn-home:hover {
      background: var(--primary-color);
      color: white;
    }
    .btn-contact {
      background: var(--secondary-color);
      color: var(--primary-color);
      border: 2px solid var(--accent-color);
    }
    .btn-contact:hover {
      background: var(--accent-color);
      color: white;
    }
    .services-link {
      display: inline-block;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }
    .services-link a {
      color: var(--accent-color);
      text-decoration: none;
      font-weight: 600;
    }
    .services-link a:hover {
      text-decoration: underline;
    }
  </style>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="dns-prefetch" href="https://stackpath.bootstrapcdn.com" />
    </head>
<body>

<div class="error-page">
  <div class="error-content">
    <h1 class="error-code">404</h1>
    <h2 class="error-title">Page Not Found</h2>
    <p class="error-description">
      Sorry! The page you're looking for doesn't exist. It might have been moved or deleted. Let's get you back on track.
    </p>

    <div class="error-buttons">
      <a href="/" class="btn-error btn-home">
        <i class="fa fa-home"></i> Back to Home
      </a>
      <a href="/services.html" class="btn-error btn-contact">
        <i class="fa fa-stethoscope"></i> View Services
      </a>
    </div>

    <div class="services-link">
      <p>Can't find what you're looking for? <a href="/contact.html">Contact us</a> for assistance.</p>
    </div>
  </div>
</div>

<script src="js/jquery.min.js" defer></script>
<script src="js/bootstrap.bundle.min.js" defer></script>

</body>
</html>
